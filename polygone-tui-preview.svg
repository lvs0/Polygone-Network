<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 720" font-family="'JetBrains Mono', 'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="header-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="accent-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="card-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="card-hover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="720" fill="url(#bg)"/>

  <!-- Accent glow top -->
  <rect width="600" height="100" fill="url(#accent-glow)" opacity="0.5"/>

  <!-- Diagonal grid lines -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="0" x2="200" y2="720"/>
    <line x1="100" y1="0" x2="300" y2="720"/>
    <line x1="200" y1="0" x2="400" y2="720"/>
    <line x1="300" y1="0" x2="500" y2="720"/>
    <line x1="400" y1="0" x2="600" y2="720"/>
    <line x1="500" y1="0" x2="700" y2="720"/>
  </g>

  <!-- ===== HEADER ===== -->
  <rect x="0" y="0" width="600" height="56" fill="#0a0a1a" opacity="0.9"/>
  <line x1="0" y1="56" x2="600" y2="56" stroke="#1e293b" stroke-width="1"/>

  <!-- Logotype -->
  <text x="24" y="36" font-size="18" font-weight="bold" fill="#22d3ee" filter="url(#glow)">⬡ POLYGONE</text>
  <text x="196" y="36" font-size="11" fill="#475569">v1.0.0</text>

  <!-- Status dot -->
  <circle cx="540" cy="28" r="5" fill="#22c55e" filter="url(#glow)"/>
  <text x="554" y="33" font-size="10" fill="#64748b">Actif</text>

  <!-- ===== TAB BAR ===== -->
  <rect x="0" y="56" width="600" height="40" fill="#0f172a"/>
  <line x1="0" y1="96" x2="600" y2="96" stroke="#1e293b" stroke-width="1"/>

  <!-- Tab 1 — Accueil (active) -->
  <rect x="0" y="56" width="150" height="40" fill="#1e293b"/>
  <rect x="0" y="93" width="150" height="3" fill="#22d3ee"/>
  <text x="48" y="82" font-size="13" font-weight="bold" fill="#22d3ee">🏠 Accueil</text>

  <!-- Tab 2 — Favoris -->
  <text x="178" y="82" font-size="13" fill="#64748b">⭐ Favoris</text>
  <line x1="150" y1="62" x2="150" y2="93" stroke="#334155" stroke-width="1"/>

  <!-- Tab 3 — Services -->
  <text x="310" y="82" font-size="13" fill="#64748b">🧩 Services</text>
  <line x1="300" y1="62" x2="300" y2="93" stroke="#334155" stroke-width="1"/>

  <!-- Tab 4 — Paramètres -->
  <text x="442" y="82" font-size="13" fill="#64748b">⚙️ Paramètres</text>
  <line x1="450" y1="62" x2="450" y2="93" stroke="#334155" stroke-width="1"/>

  <!-- ===== CONTENT ===== -->
  <rect x="0" y="96" width="600" height="570" fill="transparent"/>

