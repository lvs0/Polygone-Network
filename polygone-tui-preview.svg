  <text x="318" y="196" font-size="9" fill="#64748b">Messagerie E2E</text>
  <rect x="368" y="160" width="40" height="14" rx="3" fill="#22d3ee" opacity="0.15"/>
  <text x="374" y="171" font-size="8" fill="#22d3ee">v0.1</text>
  <!-- tiny dot -->
  <circle cx="430" cy="168" r="3" fill="#22c55e"/>

  <!-- Hide -->
  <rect x="450" y="156" width="128" height="56" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="454" y="178" font-size="13" fill="#a78bfa">👻 Hide</text>
  <text x="454" y="196" font-size="9" fill="#64748b">Proxy SOCKS5</text>
  <circle cx="566" cy="168" r="3" fill="#22c55e"/>

