  <rect x="16" y="112" width="272" height="240" rx="8" fill="url(#card-bg)" stroke="#1e293b" stroke-width="1" filter="url(#shadow)"/>
  <rect x="16" y="112" width="272" height="34" rx="8" fill="#1e293b"/>
  <rect x="16" y="138" width="272" height="8" fill="#1e293b"/>
  <text x="28" y="135" font-size="11" font-weight="bold" fill="#94a3b8">STATUT DU NŒUD</text>

  <circle cx="36" cy="172" r="6" fill="#22c55e" filter="url(#glow)"/>
  <text x="50" y="177" font-size="14" font-weight="bold" fill="#22c55e">● ACTIF</text>
  <text x="50" y="197" font-size="10" fill="#64748b">depuis 18 min · IP masquée</text>
  <text x="50" y="217" font-size="10" fill="#64748b">Pairings : 3 nœuds locaux</text>
  <text x="50" y="237" font-size="10" fill="#64748b">Trafic : 0.0 b/s entrée</text>

  <!-- Barre de seuil -->
  <rect x="28" y="260" width="230" height="6" rx="3" fill="#1e293b"/>
  <rect x="28" y="260" width="144" height="6" rx="3" fill="#22c55e"/>
  <rect x="28" y="273" width="230" height="3" rx="1.5" fill="#334155"/>
  <text x="28" y="295" font-size="10" fill="#64748b">4/7 fragments requis · 3 nœuds</text>
  <rect x="210" y="283" width="48" height="16" rx="4" fill="#1e293b" stroke="#22c55e" stroke-width="0.5"/>
  <text x="218" y="295" font-size="9" fill="#22c55e">⚠ DANGER</text>

