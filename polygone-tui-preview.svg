  <line x1="16" y1="388" x2="584" y2="388" stroke="#1e293b" stroke-width="1"/>

  <circle cx="28" cy="406" r="3" fill="#22c55e"/>
  <text x="38" y="410" font-size="10" fill="#94a3b8">Nœud démarré</text>
  <text x="520" y="410" font-size="9" fill="#475569">18 min ago</text>

  <circle cx="28" cy="428" r="3" fill="#22d3ee"/>
  <text x="38" y="432" font-size="10" fill="#94a3b8">Clé ML-KEM-1024 générée</text>
  <text x="506" y="432" font-size="9" fill="#475569">17 min ago</text>

  <circle cx="28" cy="450" r="3" fill="#22c55e"/>
  <text x="38" y="454" font-size="10" fill="#94a3b8">Pairing avec node: 127.0.0.1:4001</text>
  <text x="508" y="454" font-size="9" fill="#475569">15 min ago</text>

  <circle cx="28" cy="472" r="3" fill="#fbbf24"/>
  <text x="38" y="476" font-size="10" fill="#94a3b8">Cache zéroé — 4.2 MB libérés</text>
  <text x="506" y="476" font-size="9" fill="#475569">12 min ago</text>

  <circle cx="28" cy="494" r="3" fill="#22c55e"/>
  <text x="38" y="498" font-size="10" fill="#94a3b8">Test Shamir 4-of-7 : ✓ (35/35 combinaisons)</text>
  <text x="498" y="498" font-size="9" fill="#475569">8 min ago</text>

  <circle cx="28" cy="516" r="3" fill="#a78bfa"/>
  <text x="38" y="520" font-size="10" fill="#94a3b8">Tunnel Hide : SOCKS5 ready sur 127.0.0.1:9050</text>
  <text x="480" y="520" font-size="9" fill="#475569">5 min ago</text>

  <!-- Quick action bar -->
  <rect x="16" y="550" width="568" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="28" y="570" font-size="10" fill="#64748b">ACTIONS RAPIDES</text>

  <rect x="28" y="580" width="80" height="20" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="0.5"/>
  <text x="38" y="594" font-size="9" fill="#22d3ee">📤 Envoyer</text>

  <rect x="116" y="580" width="80" height="20" rx="4" fill="#0f172a" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="126" y="594" font-size="9" fill="#a78bfa">👻 Proxy</text>

  <rect x="204" y="580" width="80" height="20" rx="4" fill="#0f172a" stroke="#34d399" stroke-width="0.5"/>
  <text x="214" y="594" font-size="9" fill="#34d399">🔗 Mesh</text>

  <rect x="292" y="580" width="80" height="20" rx="4" fill="#0f172a" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="302" y="594" font-size="9" fill="#fbbf24">📁 Drive</text>

  <rect x="380" y="580" width="116" height="20" rx="4" fill="#0f172a" stroke="#fb7185" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="390" y="594" font-size="9" fill="#fb7185">🧠 Brain (α)</text>

  <!-- ===== FOOTER ===== -->
  <line x1="0" y1="622" x2="600" y2="622" stroke="#1e293b" stroke-width="1"/>
  <rect x="0" y="622" width="600" height="42" fill="#0a0a1a"/>

  <text x="24" y="648" font-size="10" fill="#475569">↑↓ naviguer</text>
  <text x="124" y="648" font-size="9" fill="#334155">·</text>
  <text x="138" y="648" font-size="10" fill="#475569">↵ sélectionner</text>
  <text x="248" y="648" font-size="9" fill="#334155">·</text>
  <text x="262" y="648" font-size="10" fill="#475569">q quitter</text>
  <text x="348" y="648" font-size="9" fill="#334155">·</text>
  <text x="362" y="648" font-size="10" fill="#475569">Tab basculer</text>

  <!-- Solde dans le footer -->
  <rect x="430" y="628" width="80" height="28" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <text x="440" y="648" font-size="9" fill="#64748b">⬡ 10 · 0.1/m</text>

  <!-- Version -->
  <text x="530" y="648" font-size="9" fill="#334155">v1.0.0</text>

  <!-- Bottom border glow -->
  <rect x="0" y="664" width="600" height="2" fill="url(#header-grad)" opacity="0.3"/>
</svg>