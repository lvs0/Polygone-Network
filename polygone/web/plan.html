<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>polygone · plan</title>
<link rel="stylesheet" href="style.css">
<style>
  /* Plan-specific tweaks layered on top of style.css. */
  .plan-shell {
    max-width: 880px;
    margin: 48px auto;
    padding: 0 24px;
  }
  .plan-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .plan-header h1 {
    font: 600 22px/1.2 var(--mono);
    letter-spacing: 0.04em;
    color: var(--fg);
    margin: 0;
  }
  .plan-state {
    font: 500 11px/1 var(--mono);
    padding: 4px 10px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .plan-state.idle       { color: var(--muted); }
  .plan-state.proposed   { color: #d2a8ff; border-color: #5a3a8a; }
  .plan-state.approved   { color: #79c0ff; border-color: #2a4a6a; }
  .plan-state.running    { color: #ffa657; border-color: #6a4a2a; }
  .plan-state.done       { color: #56d364; border-color: #2a6a3a; }
  .plan-state.failed     { color: #ff7b72; border-color: #6a2a2a; }
  .plan-state.rejected   { color: #ff7b72; border-color: #6a2a2a; }

  .plan-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px 24px;
    margin-bottom: 16px;
  }
  .plan-title {
    font: 500 14px/1.4 var(--mono);
    color: var(--fg);
    margin: 0 0 12px;
  }
  .plan-meta {
    font: 400 11px/1.6 var(--mono);
    color: var(--muted);
    display: grid;
    grid-template-columns: max-content 1fr;
    gap: 4px 16px;
  }
  .plan-meta dt { color: var(--muted); }
  .plan-meta dd { margin: 0; color: var(--fg); }

  .steps {
    list-style: none;
    margin: 0;
    padding: 0;
    counter-reset: step;
  }
  .step {
    display: grid;
    grid-template-columns: 24px 1fr max-content;
    gap: 12px;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font: 400 12px/1.4 var(--mono);
  }
  .step:last-child { border-bottom: 0; }
  .step-num {
    counter-increment: step;
    color: var(--muted);
    text-align: right;
  }
  .step-num::before { content: counter(step); }
  .step-action {
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 10px;
  }
  .step-rationale {
    color: var(--muted);
    font-size: 11px;
    margin-top: 2px;
  }
  .step-status {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 2px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .step-status.done   { color: #56d364; border-color: #2a6a3a; }
  .step-status.error  { color: #ff7b72; border-color: #6a2a2a; }

  .actions {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }
  button {
    font: 500 12px/1 var(--mono);
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--fg);
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 120ms ease;
  }
  button:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary {
    background: #238636;
    border-color: #2ea043;
    color: #fff;
  }
  button.primary:hover:not(:disabled) { background: #2ea043; }
  button.danger:hover:not(:disabled) { border-color: #ff7b72; color: #ff7b72; }

  .live-feed {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px 20px;
    margin-top: 32px;
  }
  .live-feed h2 {
    font: 500 11px/1 var(--mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin: 0 0 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .live-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #56d364;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(0.85); }
  }
  .feed {
    font: 400 11px/1.5 var(--mono);
    color: var(--muted);
    max-height: 220px;
    overflow-y: auto;
    padding-right: 8px;
  }
  .feed-row {
    display: grid;
    grid-template-columns: 70px 90px 1fr;
    gap: 8px;
    padding: 3px 0;
    border-bottom: 1px solid transparent;
  }
  .feed-row.error { color: #ff7b72; }
  .feed-row.done  { color: #56d364; }
  .feed-row .ts    { color: #6a737d; }
  .feed-row .src   { color: #d2a8ff; }
</style>
</head>
<body>
<div class="plan-shell">
  <div class="plan-header">
    <h1>plan</h1>
    <span id="state" class="plan-state idle">idle</span>
  </div>

  <div class="plan-card">
    <p id="title" class="plan-title">no active plan</p>
    <dl class="plan-meta">
      <dt>id</dt>          <dd id="meta-id">—</dd>
      <dt>proposed</dt>    <dd id="meta-proposed">—</dd>
      <dt>approved</dt>    <dd id="meta-approved">—</dd>
      <dt>finished</dt>    <dd id="meta-finished">—</dd>
    </dl>
    <ol id="steps" class="steps"></ol>
    <div class="actions">
      <button id="btn-propose"  class="primary">propose boot plan</button>
      <button id="btn-approve">approve</button>
      <button id="btn-reject"  class="danger">reject</button>
    </div>
  </div>

  <div class="live-feed">
    <h2><span class="live-dot"></span> live events</h2>
    <div id="feed" class="feed"></div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
let currentPlan = null;
let eventSource = null;

function fmtTime(ms) {
  if (!ms) return "—";
  const d = new Date(ms);
  return d.toLocaleTimeString();
}

function renderPlan(plan) {
  currentPlan = plan;
  const state = plan.state || "idle";
  $("state").textContent = state;
  $("state").className = "plan-state " + state;
  $("title").textContent = plan.title || "no active plan";
  $("meta-id").textContent = plan.id || "—";
  $("meta-proposed").textContent = fmtTime(plan.proposed_at_ms);
  $("meta-approved").textContent = fmtTime(plan.approved_at_ms);
  $("meta-finished").textContent = fmtTime(plan.finished_at_ms);

  const ol = $("steps");
  ol.innerHTML = "";
  (plan.steps || []).forEach((s) => {
    const li = document.createElement("li");
    li.className = "step";
    li.innerHTML =
      '<span class="step-num"></span>' +
      '<div>' +
        '<span class="step-action">' + s.action + '</span> ' +
        '<span>' + s.service + '</span>' +
        '<div class="step-rationale">' + (s.rationale || "") + '</div>' +
      '</div>' +
      '<span class="step-status">pending</span>';
    ol.appendChild(li);
  });

  // Disable buttons based on state.
  $("btn-propose").disabled = false;
  // API serializes state as TitleCase (Proposed / Approved / Rejected / Done / Failed).
  const isProposed = state === "Proposed" || state === "proposed";
  $("btn-approve").disabled = !isProposed;
  $("btn-reject").disabled  = !isProposed;
}

function pushEvent(ev) {
  const row = document.createElement("div");
  row.className = "feed-row " + (ev.severity || "");
  const ts = new Date(ev.now_ms || Date.now()).toLocaleTimeString();
  row.innerHTML =
    '<span class="ts">' + ts + '</span>' +
    '<span class="src">' + (ev.source || "?") + '</span>' +
    '<span>' + (ev.message || "") + '</span>';
  const feed = $("feed");
  feed.insertBefore(row, feed.firstChild);
  // Cap at 100 rows so the DOM doesn't grow forever.
  while (feed.childElementCount > 100) feed.removeChild(feed.lastChild);
}

async function refreshPlan() {
  try {
    const r = await fetch("/api/plan");
    const j = await r.json();
    renderPlan(j);
  } catch (e) {
    console.warn("plan fetch failed", e);
  }
}

async function post(url) {
  try {
    const r = await fetch(url, { method: "POST" });
    const j = await r.json();
    if (j._note) pushEvent({ source: "ui", message: j._note, severity: "info" });
    setTimeout(refreshPlan, 300);
  } catch (e) {
    pushEvent({ source: "ui", message: "POST failed: " + e, severity: "error" });
  }
}

function startStream() {
  if (eventSource) eventSource.close();
  eventSource = new EventSource("/api/events");
  eventSource.addEventListener("ready", (e) => {
    try {
      const d = JSON.parse(e.data);
      pushEvent({ ...d, severity: "info" });
    } catch (_) { /* ignore */ }
  });
  eventSource.onerror = () => {
    pushEvent({ source: "ui", message: "stream disconnected, retrying in 3s", severity: "error" });
    setTimeout(startStream, 3000);
  };
}

$("btn-propose").onclick = () => post("/api/plan/propose");
$("btn-approve").onclick = () => post("/api/plan/approve");
$("btn-reject").onclick  = () => post("/api/plan/reject");

refreshPlan();
startStream();
setInterval(refreshPlan, 5000);
</script>
</body>
</html>
