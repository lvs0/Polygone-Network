<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Drive — Polygone</title>
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="dashboard.css" />
<link rel="stylesheet" href="drive.css" />
</head>
<body class="page--dashboard">

<header class="nav">
  <div class="nav__inner">
    <a class="brand" href="index.html">
      <svg viewBox="0 0 32 32" class="brand__mark" aria-hidden="true">
        <polygon points="16,2 30,10 30,22 16,30 2,22 2,10" fill="none" stroke="currentColor" stroke-width="2" />
        <polygon points="16,8 24,12.5 24,19.5 16,24 8,19.5 8,12.5" fill="none" stroke="currentColor" stroke-width="1.2" />
      </svg>
      <span>Polygone</span>
    </a>
    <nav>
      <a href="index.html">Accueil</a>
      <a href="node.html">Nœud</a>
      <a href="drive.html" class="active">Drive</a>
      <a href="mesh.html">Mesh</a>
    </nav>
  </div>
</header>

<main class="dashboard">

  <!-- ── Drop zone ────────────────────────────────────────────── -->
  <section class="dropzone" id="dropzone">
    <svg viewBox="0 0 24 24" class="dropzone__icon" aria-hidden="true">
      <path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
    <p class="dropzone__title">Dépose tes fichiers ici</p>
    <p class="dropzone__hint">ou <button type="button" class="link" id="pick">choisis-les</button> · chiffré AES-256-GCM avant envoi</p>
    <input type="file" id="file-input" multiple hidden />
  </section>

  <!-- ── Toolbar ─────────────────────────────────────────────── -->
  <section class="toolbar">
    <div class="toolbar__left">
      <h1>Drive</h1>
      <span class="toolbar__quota"><span id="quota-used">0</span> / <span id="quota-total">10</span> GB utilisés</span>
    </div>
    <div class="toolbar__right">
      <input type="search" id="search" placeholder="Filtrer…" class="search" />
      <button type="button" class="btn btn--ghost" id="refresh">Rafraîchir</button>
    </div>
  </section>

  <!-- ── File table ──────────────────────────────────────────── -->
  <section class="files">
    <table class="filelist">
      <thead>
        <tr>
          <th>Nom</th>
          <th class="num">Taille</th>
          <th>Ajouté</th>
          <th>Fragments</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="files-body">
        <!-- populated by JS -->
      </tbody>
    </table>
    <p class="filelist__empty" id="empty">Aucun fichier pour l'instant.</p>
  </section>
</main>

<!-- ── Share modal ─────────────────────────────────────────────── -->
<dialog class="modal" id="share-modal">
  <form method="dialog" class="modal__form">
    <h2>Lien éphémère</h2>
    <p class="modal__file" id="share-file"></p>

    <label class="field">
      <span>Expire dans</span>
      <select id="share-ttl">
        <option value="3600">1 heure</option>
        <option value="86400" selected>1 jour</option>
        <option value="604800">7 jours</option>
        <option value="2592000">30 jours</option>
      </select>
    </label>

    <label class="field">
      <span>Limite de téléchargements</span>
      <input type="number" id="share-max" value="10" min="1" max="1000" />
    </label>

    <div class="field field--result" id="share-result" hidden>
      <span>Lien public</span>
      <code id="share-link"></code>
      <button type="button" class="btn btn--ghost" id="copy-link">Copier</button>
    </div>

    <div class="modal__actions">
      <button type="submit" class="btn btn--primary" id="create-link">Créer le lien</button>
      <button type="button" class="btn btn--ghost" id="close-modal">Fermer</button>
    </div>
  </form>
</dialog>

<!-- ── Toast ──────────────────────────────────────────────────── -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<template id="file-row">
  <tr>
    <td class="file__name">
      <span class="file__icon"></span>
      <span class="file__label"></span>
    </td>
    <td class="num file__size"></td>
    <td class="file__date"></td>
    <td class="file__frags"></td>
    <td class="file__actions">
      <button type="button" class="iconbtn" data-action="download" title="Télécharger">↓</button>
      <button type="button" class="iconbtn" data-action="share"    title="Partager">↗</button>
      <button type="button" class="iconbtn iconbtn--danger" data-action="delete" title="Supprimer">✕</button>
    </td>
  </tr>
</template>

<script src="drive.js"></script>
</body>
</html>
