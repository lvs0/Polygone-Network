<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nœud — Polygone</title>
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="dashboard.css" />
</head>
<body class="page--dashboard">

<header class="nav">
  <div class="nav__inner">
    <a class="brand" href="index.html">
      <svg viewBox="0 0 32 32" class="brand__mark" aria-hidden="true">
        <polygon points="16,2 30,10 30,22 16,30 2,22 2,10" fill="none" stroke="currentColor" stroke-width="2" />
        <polygon points="16,8 24,12.5 24,19.5 16,24 8,19.5 8,12.5" fill="none" stroke="currentColor" stroke-width="1.2" />
      </svg>
      <span>Polygone</span>
    </a>
    <nav>
      <a href="index.html">Accueil</a>
      <a href="node.html" class="active">Nœud</a>
      <a href="drive.html">Drive</a>
      <a href="mesh.html">Mesh</a>
    </nav>
    <div class="toolbar__spacer"></div>
    <div class="ws-status" data-connected="false">
      <span class="ws-status__dot"></span>
      <span class="ws-status__label">Polling</span>
    </div>
    <button class="theme-toggle" aria-label="Changer de thème">
      <span class="theme-toggle__icon">🔮</span>
      <span class="theme-toggle__label">Cyber</span>
    </button>
  </div>
</header>

<main class="dashboard">
  <!-- ── Status banner ─────────────────────────────────────────── -->
  <section class="banner" data-state="active">
    <div class="banner__left">
      <span class="banner__dot"></span>
      <div>
        <h1>Nœud actif</h1>
        <p>polygone · lvs0 · 127.0.0.1:4001</p>
      </div>
    </div>
    <div class="banner__right">
      <dl class="kv">
        <dt>Uptime</dt><dd id="uptime">00:00:00</dd>
        <dt>Peers</dt><dd id="peers">0</dd>
        <dt>Version</dt><dd>v1.0.0</dd>
      </dl>
    </div>
  </section>

  <!-- ── Stats grid ────────────────────────────────────────────── -->
  <section class="stats">
    <div class="stat">
      <div class="stat__label">Trafic entrant</div>
      <div class="stat__value" id="traffic-in">0 <span>b/s</span></div>
      <div class="stat__spark"><svg viewBox="0 0 100 24" preserveAspectRatio="none" id="spark-in"><polyline points="" fill="none" stroke="currentColor" stroke-width="1.2" /></svg></div>
      <canvas id="chart-in" class="mini-chart" style="display:none"></canvas>
    </div>

    <div class="stat">
      <div class="stat__label">Trafic sortant</div>
      <div class="stat__value" id="traffic-out">0 <span>b/s</span></div>
      <div class="stat__spark"><svg viewBox="0 0 100 24" preserveAspectRatio="none" id="spark-out"><polyline points="" fill="none" stroke="currentColor" stroke-width="1.2" /></svg></div>
      <canvas id="chart-out" class="mini-chart" style="display:none"></canvas>
    </div>

    <div class="stat">
      <div class="stat__label">Fragments Shamir</div>
      <div class="stat__value"><span id="frag-ready">0</span><span class="stat__sep">/</span><span id="frag-needed">4</span></div>
      <div class="bar"><div class="bar__fill" id="frag-bar" style="width:0%"></div></div>
    </div>

    <div class="stat stat--accent">
      <div class="stat__label">Solde POLY</div>
      <div class="stat__value" id="balance">0</div>
      <div class="stat__sub"><span id="consumption">0</span> /min consommés</div>
    </div>
  </section>

  <!-- ── Modules + Log ─────────────────────────────────────────── -->
  <section class="panels">
    <div class="panel">
      <h2 class="panel__title">Modules</h2>
      <ul class="modules" id="modules">
        <!-- populated by JS -->
      </ul>
    </div>

    <div class="panel panel--log">
      <h2 class="panel__title">Activité</h2>
      <ol class="log" id="log">
        <!-- populated by JS -->
      </ol>
    </div>
  </section>

  <!-- ── Network Topology ────────────────────────────────────────── -->
  <section class="topology-section">
    <div class="panel">
      <h2 class="panel__title">🌐 Topologie Réseau</h2>
      <div class="topology">
        <canvas id="topo-canvas" width="600" height="300"></canvas>
        <div class="topology__legend">
          <span class="topo-item"><span class="topo-dot topo-dot--self"></span> Vous</span>
          <span class="topo-item"><span class="topo-dot topo-dot--peer"></span> Pair actif</span>
          <span class="topo-item"><span class="topo-dot topo-dot--relay"></span> Relais</span>
        </div>
      </div>
    </div>
  </section>
</main>

<template id="module-template">
  <li class="module">
    <span class="module__dot"></span>
    <span class="module__icon"></span>
    <span class="module__name"></span>
    <span class="module__status"></span>
  </li>
</template>

<template id="log-template">
  <li class="log__entry">
    <span class="log__time"></span>
    <span class="log__msg"></span>
  </li>
</template>

<script src="dashboard.js"></script>
</body>
</html>
